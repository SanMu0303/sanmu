<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>热度与异动榜单</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260427-fundingfix-1" />
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">A</div>
          <div>
            <p class="eyebrow">SANMU TRADING</p>
            <h1>三木交易面板</h1>
          </div>
        </div>
        <div class="toolbar-meta">
          <button class="theme-toggle-button" id="themeToggleButton" type="button" aria-label="切换主题" title="切换主题">☾</button>
          <button class="ghost-button" id="refreshButton">刷新数据</button>
          <span id="refreshState">自动刷新：5秒</span>
          <span id="fetchStatus">等待加载</span>
          <span id="updateTime"></span>
        </div>
      </header>

      <section class="volume-strip-panel">
        <div class="volume-strip" id="volumeTopStrip"></div>
      </section>

      <main class="dashboard-grid">
        <section class="board-panel" id="heatPanel">
          <div class="panel-header">
            <h2>币安合约综合热度榜前10</h2>
          </div>
          <div class="panel-body" id="heatTable"></div>
        </section>

        <section class="board-panel" id="chainPanel">
          <div class="panel-header">
            <h2>TradingView K线窗口</h2>
          </div>
          <div class="panel-body tradingview-panel" id="tradingviewPanel"></div>
        </section>

        <aside class="side-panel">
          <div class="sub-panel">
            <div class="panel-header">
              <h2>价格异动</h2>
            </div>
            <div class="panel-body">
              <div id="shockList"></div>
              <div class="history-block">
                <div class="history-header">
                  <div class="history-title">历史留存</div>
                  <button class="history-clear-btn" type="button" data-clear-history="shock">清空</button>
                </div>
                <div id="shockHistoryList"></div>
              </div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="sub-panel">
            <div class="panel-header">
              <h2>异常放量</h2>
            </div>
            <div class="panel-body">
              <div id="volumeAlertList"></div>
              <div class="history-block">
                <div class="history-header">
                  <div class="history-title">历史留存</div>
                  <button class="history-clear-btn" type="button" data-clear-history="volume">清空</button>
                </div>
                <div id="volumeHistoryList"></div>
              </div>
            </div>
          </div>
        </aside>

        <section class="stack-panel compact-stack-panel">
          <div class="sub-panel">
            <div class="panel-header">
              <h2>币安合约涨幅榜 top5</h2>
            </div>
            <div class="panel-body" id="gainersTable"></div>
          </div>
          <div class="divider"></div>
          <div class="sub-panel">
            <div class="panel-header">
              <h2>币安合约跌幅榜 top5</h2>
            </div>
            <div class="panel-body" id="losersTable"></div>
          </div>
        </section>

        <section class="stack-panel compact-stack-panel">
          <div class="sub-panel">
            <div class="panel-header">
              <h2>币安合约正资金费率 top5</h2>
            </div>
            <div class="panel-body" id="positiveFundingTable"></div>
          </div>
          <div class="divider"></div>
          <div class="sub-panel">
            <div class="panel-header">
              <h2>币安合约负资金费率 top5</h2>
            </div>
            <div class="panel-body" id="negativeFundingTable"></div>
          </div>
        </section>
      </main>

      <section class="bottom-strip">
        <section class="bottom-panel">
          <div class="panel-header">
            <h2>热点事件</h2>
          </div>
          <div class="panel-body compact-feed" id="hotEventFeed"></div>
        </section>

        <section class="bottom-panel">
          <div class="panel-header">
            <h2>金十数据</h2>
            <div class="panel-header-status" id="jin10StatusBar"></div>
          </div>
          <div class="panel-body compact-feed" id="listingFeed"></div>
        </section>
      </section>
    </div>

    <script src="./config.js?v=20260427-fundingfix-1"></script>
    <script src="./script.js?v=20260427-fundingfix-1"></script>
  </body>
</html>
